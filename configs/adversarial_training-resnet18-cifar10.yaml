model:
  name: resnet18_10
  pretrained: false
  weights_path: null
  loss_fn: cross_entropy
  num_classes: 10

dataset:
  name: cifar10
  root_dir: data/dataset/cifar_10
  train: true
  download: true
  batch_size: 128
  num_workers: 2

split:
  enabled: true
  eval_ratio: 0.1
  seed: 42
  shuffle: true
  eval_size: null

training:
  enabled: true
  epochs: 100
  seed: 42
  criterion: cross_entropy

  checkpoint: null
  save_dir: ./outputs/train/adversarial_pgd/cifar10_resnet18
  save_best: true
  save_last: true
  metric_for_best_model: eval_acc

  optimizer:
    name: sgd
    lr: 0.1
    weight_decay: 0.0005
    momentum: 0.9
    nesterov: true

  scheduler:
    name: cosine
    step_size: 30
    gamma: 0.1
    eta_min: 0.0
    milestones: [ ]

  wandb:
    enabled: false
    project: certified-robustness
    entity: null
    run_name: adversarial_pgd_cifar10_resnet18_train
    tags:
      - adversarial-training
      - pgd
      - cifar10
      - resnet18

pgd:
  name: pgd

  # For CIFAR-10 in [0,1] space:
  # epsilon = 8/255 ≈ 0.031
  # alpha   = 2/255 ≈ 0.007
  epsilon: 0.031
  alpha: 0.007
  steps: 10

  # Your NormName currently supports "Linf" and "l2".
  norm: Linf

  loss_fn: cross_entropy

  # CIFAR-10 normalization statistics.
  # Used by attack implementation if it supports normalized inputs.
  mean: [ 0.4914, 0.4822, 0.4465 ]
  std: [ 0.2470, 0.2435, 0.2616 ]

fgsm:
  name: fgsm
  epsilon: 0.031
  loss_fn: cross_entropy
  mean: [ 0.4914, 0.4822, 0.4465 ]
  std: [ 0.2470, 0.2435, 0.2616 ]