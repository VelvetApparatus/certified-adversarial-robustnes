model:
  name: resnet18_10
  pretrained: false
  weights_path: null
  loss_fn: cross_entropy
  num_classes: 10

dataset:
  name: cifar10
  root_dir: data/dataset/cifar_10
  train: true
  download: true
  batch_size: 128
  num_workers: 2

split:
  enabled: true
  eval_ratio: 0.1
  seed: 42
  shuffle: true
  eval_size: null

train:
  enabled: true
  epochs: 100
  seed: 42
  criterion: cross_entropy

  checkpoint: null
  save_dir: ./outputs/train/gaussian_noise/cifar10_resnet18
  save_best: true
  save_last: true
  metric_for_best_model: eval_noisy_loss
  metric_mode_for_best_model: max

  optimizer:
    name: sgd
    lr: 0.1
    weight_decay: 0.0005
    momentum: 0.9
    nesterov: true

  scheduler:
    name: cosine
    step_size: 30
    gamma: 0.1
    eta_min: 0.0
    milestones: [ ]

  wandb:
    enabled: true
    project: certified-robustness
    entity: null
    run_name: gaussian_noise_cifar10_resnet18
    tags:
      - gaussian
      - cifar10
      - resnet18

params:
  # Gaussian noise standard deviation.
  # Важно: если normalized_space=true, sigma применяется к уже нормализованному tensor.
  sigma: 0.25

  # Weight of CE loss on clean inputs.
  clean_loss_weight: 0.5

  # Weight of CE loss on noisy inputs.
  noisy_loss_weight: 1.0

  # Fraction of batch to which Gaussian noise is applied.
  noise_ratio: 1.0

  # If true, noise is added directly in normalized tensor space.
  # If false, implementation should unnormalize -> add noise -> clamp [0,1] -> normalize.
  normalized_space: false


normalization:
  enabled: true
  mean: [ 0.4914, 0.4822, 0.4465 ]
  std: [ 0.2470, 0.2435, 0.2616 ]
