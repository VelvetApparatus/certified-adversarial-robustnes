model:
  name: resnet18_10
  weights_path: outputs/train/macer/cifar10_resnet18/resnet18_10_cifar10_20260508_110415/checkpoints/best.pth
  pretrained: true
  num_classes: 10

test_dataset:
  name: cifar10
  root_dir: data/dataset/cifar_10
  download: true
  batch_size: 128

fgsm:
  epsilon: 0.03137
  norm: Linf
  loss_fn: cross_entropy

pgd:
  epsilon: 0.03137
  alpha: 0.00784
  steps: 20
  norm: Linf
  loss_fn: cross_entropy

params:
  method: macer
  comment: resnet18_10 cifar10 macer evaluation
  loss_fn: cross_entropy
  sigma: 0.25
  cert_mode: soft
  N0: 100
  N: 100000
  alpha: 0.001
  beta: 16.0
  evaluation_dir: data/out/evaluation/resnet18_cifar10


normalization:
  enabled: true
  mean: [ 0.4914, 0.4822, 0.4465 ]
  std: [ 0.2470, 0.2435, 0.2616 ]


