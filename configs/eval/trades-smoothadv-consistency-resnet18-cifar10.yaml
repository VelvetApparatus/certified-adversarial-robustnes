model:
  name: resnet18_10
  # Update <RUN_NAME> after training, e.g. ResNet_cifar10_20260513_123456
  weights_path: "outputs/train/trades_smoothadv_consistency/cifar10_resnet18/<RUN_NAME>/checkpoints/best.pth"
  pretrained: true
  num_classes: 10

test_dataset:
  name: cifar10
  root_dir: data/dataset/cifar_10
  download: true
  batch_size: 128

fgsm:
  epsilon: 0.03137
  norm: Linf
  loss_fn: cross_entropy

pgd:
  epsilon: 0.03137
  alpha: 0.00784
  steps: 20
  norm: Linf
  loss_fn: cross_entropy

params:
  method: TRADES-SmoothAdv-Consistency
  comment: resnet18_10 cifar10 combined TRADES + SmoothAdv + consistency evaluation
  loss_fn: cross_entropy
  sigma: 0.25
  cert_mode: hard
  N0: 100
  N: 10000
  alpha: 0.001
  beta: 16.0
  evaluation_dir: data/out/evaluation/resnet18_cifar10

normalization:
  enabled: true
  mean: [0.4914, 0.4822, 0.4465]
  std: [0.2470, 0.2435, 0.2616]

wandb:
  enabled: false
  project: certified-robustness
  entity:
  run_name:
  tags:
    - evaluation
    - cifar10
    - resnet18
