params:
  method: baseline-autoattack-debug
  evaluation_dir: data/out/autoattack/resnet18_cifar10
  loss_fn: cross_entropy
  comment: AutoAttack debug evaluation for baseline ResNet18 CIFAR-10 checkpoint

model:
  name: resnet18_10
  num_classes: 10
  pretrained: true
  weights_path: data/models/resnet/resnet_18_cifar_10/resnet18_cifar10_full.pth

test_dataset:
  name: cifar10
  root_dir: data/dataset/cifar_10
  train: false
  download: true
  batch_size: 128

normalization:
  enabled: true
  mean: [0.4914, 0.4822, 0.4465]
  std: [0.2470, 0.2435, 0.2616]

autoattack:
  norm: Linf
  epsilon: 0.031372549
  version: "custom"
  attacks_to_run:
    - "apgd-ce"
  max_examples: 1000
  seed: 0

wandb:
  enabled: false
  project: certified-robustness
  entity: ""
  run_name: ""
  tags:
    - evaluation
    - autoattack
    - autoattack-debug
    - cifar10
    - resnet18
