model:
  name: resnet18_10
  pretrained: false
  weights_path: null
  loss_fn: cross_entropy
  num_classes: 10

dataset:
  name: cifar10
  root_dir: ./data/dataset/cifar_10
  train: true
  download: false
  batch_size: 128
  num_workers: 2

split:
  enabled: true
  eval_ratio: 0.1
  eval_size: null
  seed: 42
  shuffle: true

training:
  enabled: true
  epochs: 100
  seed: 42
  criterion: cross_entropy

  checkpoint: null
  save_dir: ./outputs/train/trades/cifar10_resnet18
  save_best: true
  save_last: true
  metric_for_best_model: eval_pgd_acc
  metric_mode_for_best_model: max

  optimizer:
    name: sgd
    lr: 0.1
    weight_decay: 0.0005
    momentum: 0.9
    nesterov: true

  scheduler:
    name: cosine
    step_size: 30
    gamma: 0.1
    eta_min: 0.0
    milestones: [ ]

  wandb:
    enabled: true
    project: certified-robustness
    entity: null
    run_name: trades_cifar10_resnet18
    tags:
      - trades
      - cifar10
      - resnet18

trades_params:
  epsilon: 0.031372549
  step_size: 0.007843137
  perturb_steps: 10
  beta: 6.0
  distance: l_inf

train_pgd:
  name: pgd
  epsilon: 0.031372549  # 8/255
  alpha: 0.007843137    # 2/255
  steps: 10
  norm: Linf
  loss_fn: kl_divergence

eval_pgd:
  name: pgd
  epsilon: 0.031372549  # 8/255
  alpha: 0.007843137    # 2/255
  steps: 10
  norm: Linf
  loss_fn: cross-entropy

normalization:
  enabled: true
  mean: [ 0.4914, 0.4822, 0.4465 ]
  std: [ 0.2470, 0.2435, 0.2616 ]
