model:
  name: resnet18_10
  pretrained: false
  weights_path: null
  loss_fn: cross_entropy
  num_classes: 10

dataset:
  name: cifar10
  root_dir: ./data/dataset/cifar_10
  train: true
  download: false
  batch_size: 128
  num_workers: 4

split:
  enabled: true
  eval_ratio: 0.1
  eval_size: null
  seed: 42
  shuffle: true

training:
  enabled: true
  epochs: 100
  seed: 42
  criterion: cross_entropy

  checkpoint: null
  save_dir: ./outputs/train/macer/cifar10_resnet18
  save_best: true
  save_last: true
  metric_for_best_model: eval_macer_acc
  metric_mode_for_best_model: max

  optimizer:
    name: sgd
    lr: 0.1
    weight_decay: 0.0005
    momentum: 0.9
    nesterov: true

  scheduler:
    name: cosine
    step_size: 30
    gamma: 0.1
    eta_min: 0.0
    milestones: [ ]

  wandb:
    enabled: true
    project: certified-robustness
    entity: null
    run_name: macer_cifar10_resnet18
    tags:
      - macer
      - randomized-smoothing
      - cifar10
      - resnet18

params:
  gauss_samples: 16
  sigma: 0.25
  num_classes: 10

  beta:
    value: 4.0
    scheduler:
      enabled: true
      type: linear
      start: 1.0
      end: 4.0
      warmup_epochs: 10
      ramp_epochs: 30

  gamma: 4.0

  lbd:
    value: 2.0
    scheduler:
      enabled: true
      type: linear
      start: 0.0
      end: 2.0
      warmup_epochs: 20
      ramp_epochs: 40

  eps: 0.000001

normalization:
  enabled: true
  mean: [ 0.4914, 0.4822, 0.4465 ]
  std: [ 0.2470, 0.2435, 0.2616 ]
