model:
  name: resnet18_10
  weights_path: outputs/train/adversarial_pgd/cifar10_resnet18/resnet18_10_cifar10_20260502_191001/checkpoints/best.pth
test_dataset:
  name: cifar10
  root_dir: data/dataset/cifar_10
  download: true
  batch_size: 128

fgsm:
  epsilon: 0.03137
  loss_fn: cross_entropy
  mean: [ 0.4914, 0.4822, 0.4465 ]
  std: [ 0.2023, 0.1994, 0.2010 ]

pgd:
  epsilon: 0.03137
  alpha: 0.00784
  steps: 10
  norm: Linf
  loss_fn: cross_entropy
  mean: [ 0.4914, 0.4822, 0.4465 ]
  std: [ 0.2023, 0.1994, 0.2010 ]



params:

  method: adversarial-training
  comment: resnet18_10 cifar10 adversarial training evaluation
  loss_fn: cross_entropy

  # used for noisy evaluation and randomized smoothing certification
  sigma: 0.25

  # randomized smoothing certification
  cert_mode: hard
  N0: 100
  N: 1000
  alpha: 0.001
  beta: 1.0
  evaluation_dir: data/out/evaluation/resnet18_cifar10_gauss




