model:
  name: resnet18_10
  weights_path: outputs/train/adversarial_pgd/cifar10_resnet18/resnet18_10_cifar10_20260502_191001/checkpoints/best.pth
test_dataset:
  name: cifar10
  root_dir: data/dataset/cifar_10
  download: true
  batch_size: 128

attacks:
  - name: fgsm
    epsilon: 0.03137
    loss_fn: cross_entropy
    mean: [ 0.4914, 0.4822, 0.4465 ]
    std: [ 0.2023, 0.1994, 0.2010 ]

  - name: pgd
    epsilon: 0.03137
    alpha: 0.00784
    steps: 10
    norm: Linf
    loss_fn: cross_entropy
    mean: [ 0.4914, 0.4822, 0.4465 ]
    std: [ 0.2023, 0.1994, 0.2010 ]

evaluation_root: data/out/evaluation/resnet18_cifar10_gauss




