macer_params:
  output_dir: "output/macer-resnet18-cifar10"
  seed: 42
  gauss_samples: 16
  sigma: 0.25
  beta: 16.0
  num_classes: 10
  gamma: 8.0
  lbd: 12.0
  epochs: 300
  certificate_every_epoch: 10
  certificate_epoch_threshold: 200
  #  checkpoint: "checkpoints/macer-resnet18-cifar10.pth"
  cert_start: 100
  cert_num: 1000

model:
  name: resnet18
  pretrained: false
  num_classes: 10

train_dataset:
  name: cifar10
  root_dir: data/dataset/cifar_10
  download: true
  batch_size: 128

test_dataset:
  name: cifar10
  root_dir: data/dataset/cifar_10
  download: true
  batch_size: 128

optimizer:
  name: sgd
  lr: 0.1
  weight_decay: 0.0005
  momentum: 0.9
  nesterov: false

scheduler:
  name: multistep
  milestones: [ 100, 200 ]
  gamma: 0.1
