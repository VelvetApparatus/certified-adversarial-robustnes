model:
  name: resnet18_10
  pretrained: false
  weights_path: null
  loss_fn: cross_entropy
  num_classes: 10

dataset:
  name: cifar10
  root_dir: data/dataset/cifar_10
  train: true
  download: true
  batch_size: 128
  num_workers: 2

split:
  enabled: true
  eval_ratio: 0.1
  seed: 42
  shuffle: true
  eval_size: null

training:
  enabled: true
  epochs: 100
  seed: 42
  criterion: cross_entropy

  checkpoint: null
  save_dir: ./outputs/train/adversarial_fgsm/cifar10_resnet18
  save_best: true
  save_last: true
  metric_for_best_model: eval_fgsm_acc
  metric_mode_for_best_model: max

  optimizer:
    name: sgd
    lr: 0.1
    weight_decay: 0.0005
    momentum: 0.9
    nesterov: true

  scheduler:
    name: cosine
    step_size: 30
    gamma: 0.1
    eta_min: 0.0
    milestones: [ ]

  wandb:
    enabled: true
    project: certified-robustness
    entity: null
    run_name: adversarial_fgsm_cifar10_resnet18_train
    tags:
      - adversarial-training
      - fgsm
      - cifar10
      - resnet18

pgd:
  epsilon: 0.031372549
  alpha: 0.007843137
  steps: 20
  norm: Linf
  random_start: true
  restarts: 1
  loss_fn: cross_entropy

fgsm:
  name: fgsm
  epsilon: 0.031372549
  alpha: 0.039215686   # 10/255
  random_start: true
  loss_fn: cross_entropy

normalization:
  enabled: true
  mean: [ 0.4914, 0.4822, 0.4465 ]
  std: [ 0.2470, 0.2435, 0.2616 ]
