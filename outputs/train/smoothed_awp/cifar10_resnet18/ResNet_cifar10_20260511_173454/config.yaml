model:
  name: resnet18_10
  pretrained: false
  weights_path: null
  loss_fn: cross_entropy
  num_classes: 10

dataset:
  name: cifar10
  root_dir: ./data/dataset/cifar_10
  train: true
  download: false
  batch_size: 128
  num_workers: 2

split:
  enabled: true
  eval_ratio: 0.1
  eval_size: null
  seed: 42
  shuffle: true

training:
  enabled: true
  epochs: 100
  seed: 42
  criterion: cross_entropy
  checkpoint: null
  save_dir: ./outputs/train/smoothed_awp/cifar10_resnet18
  save_best: true
  save_last: true

  # evaluate_smoothed should return this key.
  # If it does not, change to eval_smoothed_acc.
  metric_for_best_model: eval_macer_score
  metric_mode_for_best_model: max

  optimizer:
    name: sgd
    lr: 0.1
    weight_decay: 0.0005
    momentum: 0.9
    nesterov: true

  scheduler:
    name: cosine
    step_size: 30
    gamma: 0.1
    eta_min: 0.0
    milestones: [ ]

  wandb:
    enabled: true
    project: certified-robustness
    entity: null
    run_name: smoothed_awp_cifar10_resnet18
    tags:
      - smooth-adv
      - awp
      - cifar10
      - resnet18

normalization:
  enabled: true
  mean: [ 0.4914, 0.4822, 0.4465 ]
  std: [ 0.2470, 0.2435, 0.2616 ]

params:
  sigma:
    value: 0.25
    scheduler:
      enabled: false

  epsilon:
    value: 0.25
    scheduler:
      enabled: false

  step_size: 0.0625
  steps: 10
  num_noise_vec: 2
  norm: l2
  train_multi_noise: true
  clamp_noisy: true

  beta:
    value: 1.0
    scheduler:
      enabled: false

attack:
  name: smoothed_pgd
  epsilon:
    value: 0.25
    scheduler:
      enabled: false

  alpha:
    value: 0.0625
    scheduler:
      enabled: false

  steps: 10
  norm: l2
  random_start: true
  clamp_noisy: true

awp:
  weights_diff_coef: 0.005
  weights_epsilon: 1.0e-20
  warmup_steps: 15

  # beta here is only for AWPCrossEntropy if you keep it.
  # If AWPCrossEntropy ignores beta, this can be removed later.
  beta:
    value: 1.0
    scheduler:
      enabled: false

  proxy_optimizer:
    name: sgd
    lr: 0.01
    momentum: 0.9
    weight_decay: 0.0
    nesterov: false

eval_smoothed:
  samples: 64
  num_classes: 10
  eps: 0.25